<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Event</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

html,body{
    width:100%;
    height:100%;
    background:#f5f5f7;
    overflow:hidden;
}

#event{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:90%;
    max-width:420px;
    background:#fff;
    border-radius:24px;
    padding:35px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.18);
}

.badge{
    display:inline-block;
    background:#00b894;
    color:#fff;
    padding:8px 18px;
    border-radius:999px;
    font-size:14px;
    margin-bottom:20px;
}

h1{
    font-size:34px;
    margin-bottom:15px;
}

p{
    color:#666;
    line-height:1.7;
    margin-bottom:30px;
}

button{
    width:100%;
    border:none;
    border-radius:15px;
    background:#007AFF;
    color:#fff;
    font-size:20px;
    padding:18px;
    cursor:pointer;
}

#loading{
    display:none;
    position:fixed;
    inset:0;
    background:#000;
    color:#fff;
    font-size:28px;
    justify-content:center;
    align-items:center;
}

#photo{
    display:none;
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
}
</style>
</head>

<body>

<div id="event">
    <div class="card">
        <div class="badge">🎉 Lucky Event</div>

        <h1>축하합니다!</h1>

        <p>
            회원님의 응모가 추첨에 선정되었습니다.<br>
            아래 버튼을 눌러 당첨 결과를 확인하세요.
        </p>

        <button onclick="start()">당첨 확인하기</button>
    </div>
</div>

<div id="loading">
당첨 확인 중...
</div>

<img id="photo" src="https://i.imgur.com/509fbI0.jpeg">

<script>
function start(){

document.getElementById("event").style.display="none";

document.getElementById("loading").style.display="flex";

setTimeout(function(){

document.getElementById("loading").style.display="none";

document.getElementById("photo").style.display="block";

},1000);

}
</script>

</body>
</html>
